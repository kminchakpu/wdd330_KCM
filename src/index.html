<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="js/main.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="categories">
            <h2>Shop by Category</h2>
            <div class="category-grid">
              <a class="category-card" href="/product_listing/?category=tents">
                <img src="/images/categories/tent-green.png" alt="Tents">
                <h3>Tents</h3>
              </a>

              <a class="category-card" href="/product_listing/?category=backpacks">
                <img src="/images/categories/backpack.png" alt="Backpacks">
                <h3>Backpacks</h3>
              </a>

              <a class="category-card" href="/product_listing/?category=sleeping-bags">
                <img src="/images/categories/sleeping-bags.jpg" alt="Sleeping Bags">
                <h3>Sleeping Bags</h3>
              </a>

              <a class="category-card" href="/product_listing/?category=hammocks">
                <img src="/images/categories/hammock.png" alt="Hammocks">
                <h3>Hammocks</h3>
              </a>
            </div>
          </section>
        </main>
    <footer id="main-footer"></footer>
  </body>
</html>
