<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Make and Name</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product.js" type="module"></script>
  </head>

  <body>
    <header id="main-header"></header>
    <main class="divider">
      <section class="product-detail">
        <h2>Brand Name</h2>

        <h3 class="divider">Product Name</h3>

        <div class="product-image-wrapper">
          <img
            id="productImage"
            src="../images/camping-products.jpg"
            alt="Sleep Outside Camping Products"
            class="divider"
          />
          <!-- Discount Badge -->
          <span id="discountBadge" class="discount-badge"></span>
        </div>

        <!-- Original Price -->
        <p id="retailPrice" class="product-detail__retail"></p>

        <!-- Sale Price -->
        <p id="productPrice" class="product-detail__price"></p>
        <p id="productColor" class="product__color">Color</p>
        <p id="productDesc" class="product__description">Description</p>

        <div class="product-detail__add">
          <button type="button" id="addToCart" data-id="productId">
            Add to Cart
          </button>
        </div>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
