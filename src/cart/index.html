<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Cart</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="../js/cart.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <section class="products">
        <h2>My Cart</h2>

        <ul class="product-list cart-list">
          <!-- Cart items are inserted here by JavaScript -->
        </ul>

        <!-- Cart Total -->
        <div class="cart-footer hide">
          <p class="cart-total"></p>
        </div>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
